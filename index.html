<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Key Admin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #c9d1d9; }
input, select, button { font-family: inherit; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-num { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 13px; color: #8b949e; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.row input, .row select { padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; }
.row input:focus, .row select:focus { border-color: #58a6ff; outline: none; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-pri { background: #238636; color: #fff; }
.btn-pri:hover { background: #2ea043; }
.btn-red { background: #da3633; color: #fff; }
.btn-red:hover { background: #f85149; }
.btn-sec { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
.btn-sec:hover { background: #30363d; }
.btn-org { background: #d29922; color: #fff; }
.btn-org:hover { background: #e3b341; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 12px; color: #8b949e; border-bottom: 1px solid #21262d; cursor: pointer; white-space: nowrap; }
th:hover { color: #c9d1d9; }
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #21262d; }
tr:hover td { background: #1c2128; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-active { background: #1b3a2d; color: #3fb950; }
.badge-revoked { background: #3d1f1e; color: #f85149; }
.badge-unused { background: #3d2e00; color: #d29922; }
.key-txt { font-family: monospace; font-size: 12px; color: #f0883e; cursor: pointer; }
.key-txt:hover { color: #ffa657; text-decoration: underline; }
.hwid-txt { font-family: monospace; font-size: 11px; color: #58a6ff; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
.small { font-size: 11px; color: #8b949e; }
.ip-txt { font-family: monospace; font-size: 11px; color: #8b949e; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
.actions { display: flex; gap: 4px; flex-wrap: wrap; }
.msg { font-size: 12px; color: #3fb950; margin-top: 4px; }
.msg.err { color: #f85149; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 40px; width: 360px; text-align: center; }
.login-box h1 { font-size: 22px; margin-bottom: 4px; }
.login-box p { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 10px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; margin-bottom: 12px; }
.login-box input:focus { border-color: #58a6ff; outline: none; }
.login-box button { width: 100%; padding: 10px; background: #238636; border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #2ea043; }
.login-err { color: #f85149; font-size: 13px; margin-top: 10px; display: none; }
.hide { display: none; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #161b22; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
.header h1 { font-size: 18px; }
.cont { max-width: 1400px; margin: 0 auto; padding: 0 24px 40px; }
.tbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.tleft { display: flex; gap: 6px; flex-wrap: wrap; }
.fbtn { padding: 6px 14px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #8b949e; font-size: 12px; cursor: pointer; }
.fbtn:hover { border-color: #58a6ff; color: #c9d1d9; }
.fbtn.on { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.sbox { padding: 6px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 13px; width: 200px; }
.sbox:focus { border-color: #58a6ff; outline: none; }
.pages { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.pbtn { padding: 4px 10px; background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 12px; cursor: pointer; }
.pbtn:hover { border-color: #58a6ff; color: #c9d1d9; }
.pbtn.cur { background: #1f6feb; border-color: #1f6feb; color: #fff; cursor: default; }
.gen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .gen-grid { grid-template-columns: 1fr; } }
.cbox { width: 16px; height: 16px; cursor: pointer; accent-color: #58a6ff; }
.copied-msg { position: fixed; bottom: 20px; right: 20px; background: #238636; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; }
.copied-msg.show { opacity: 1; }
</style>
</head>
<body>

<div id="copiedToast" class="copied-msg">Copied!</div>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h1>Key System</h1>
    <p>Admin Dashboard</p>
    <input type="password" id="loginPass" placeholder="Admin password" autofocus>
    <button onclick="login()">Unlock</button>
    <div class="login-err" id="loginError">Wrong password</div>
  </div>
</div>

<div id="app" class="hide">
  <div class="header">
    <h1>Key System</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="small" id="headerStats"></span>
      <span class="small" id="dbStatus" style="color:#8b949e"></span>
      <button class="btn btn-sec" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="cont">
    <div class="grid">
      <div class="card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total Keys</div></div>
      <div class="card"><div class="stat-num" id="statActive">-</div><div class="stat-label">Activated</div></div>
      <div class="card"><div class="stat-num" id="statRevoked">-</div><div class="stat-label">Revoked</div></div>
      <div class="card"><div class="stat-num" id="statUnused">-</div><div class="stat-label">Unactivated</div></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="gen-grid">
        <div>
          <div class="small" style="margin-bottom:6px">Generate Key</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;gap:8px">
              <input type="text" id="genNote" placeholder="note" style="flex:1">
              <input type="number" id="genMaxUses" placeholder="max uses" style="width:90px" min="0">
            </div>
            <div style="display:flex;gap:8px">
              <input type="datetime-local" id="genExpires" style="flex:1">
              <button class="btn btn-pri" onclick="generateKey()" style="white-space:nowrap">Generate</button>
            </div>
          </div>
          <div class="msg" id="genResult"></div>
        </div>
        <div>
          <div class="small" style="margin-bottom:6px">Bulk Generate</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;gap:8px">
              <input type="number" id="bulkCount" value="5" min="1" max="100" style="width:60px">
              <input type="text" id="bulkNote" placeholder="note" style="flex:1">
              <input type="number" id="bulkMaxUses" placeholder="max uses" style="width:90px" min="0">
            </div>
            <div style="display:flex;gap:8px">
              <input type="datetime-local" id="bulkExpires" style="flex:1">
              <button class="btn btn-pri" onclick="bulkGenerate()">Generate x<span id="bulkLabel">5</span></button>
            </div>
          </div>
          <div class="msg" id="bulkResult"></div>
        </div>
        <div>
          <div class="small" style="margin-bottom:6px">Revoke / Restore / Delete</div>
          <div class="row">
            <input type="text" id="manageKey" placeholder="AC-..." style="flex:1;font-family:monospace">
            <button class="btn btn-red" onclick="revokeKey()">Revoke</button>
            <button class="btn btn-pri" onclick="unrevokeKey()">Restore</button>
            <button class="btn btn-red" onclick="deleteKey()">Delete</button>
          </div>
          <div class="msg" id="manageResult"></div>
        </div>
        <div>
          <div class="small" style="margin-bottom:6px">Reset HWID</div>
          <div class="row">
            <input type="text" id="resetKey" placeholder="AC-..." style="flex:1;font-family:monospace">
            <button class="btn btn-sec" onclick="resetHWID()">Reset HWID</button>
          </div>
          <div class="msg" id="resetResult"></div>
          <div class="small" style="margin-top:4px">Allows key to activate on a new machine</div>
        </div>
      </div>
    </div>

    <div class="tbar">
      <div class="tleft">
        <button class="fbtn on" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('active',this)">Active</button>
        <button class="fbtn" onclick="setFilter('revoked',this)">Revoked</button>
        <button class="fbtn" onclick="setFilter('activated',this)">Activated</button>
        <button class="fbtn" onclick="setFilter('unactivated',this)">Unactivated</button>
        <button class="btn btn-org" onclick="exportCSV()" style="font-size:12px;padding:6px 10px">CSV</button>
        <button class="btn btn-sec" onclick="purgeExpired()" style="font-size:12px;padding:6px 10px">Purge Expired</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="bulkRevokeBtn" class="btn btn-red" style="font-size:11px;padding:4px 8px;display:none" onclick="bulkRevoke()">Revoke Selected</button>
        <button id="bulkDeleteBtn" class="btn btn-red" style="font-size:11px;padding:4px 8px;display:none" onclick="bulkDelete()">Delete Selected</button>
        <input type="text" class="sbox" id="searchBox" placeholder="Search..." oninput="searchChanged()">
      </div>
    </div>

    <div class="card" style="padding:0;overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:30px"><input type="checkbox" class="cbox" id="selectAll" onchange="toggleAll()"></th>
            <th onclick="sortBy('key')">Key</th>
            <th onclick="sortBy('status')">Status</th>
            <th onclick="sortBy('hwid')">HWID</th>
            <th onclick="sortBy('note')">Note</th>
            <th onclick="sortBy('maxUses')">Uses</th>
            <th onclick="sortBy('createdAt')">Created</th>
            <th onclick="sortBy('expires')">Expires</th>
            <th onclick="sortBy('lastSeen')">Last Seen</th>
            <th onclick="sortBy('lastIp')">Last IP</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="pagination" class="tbar" style="margin-top:12px"></div>
  </div>
</div>

<script>
var allKeys = [];
var keys = [];
var filter = "all";
var sf = "createdAt";
var sd = -1;
var token = localStorage.getItem("token");
var curPage = 1;
var totalKeys = 0;
var totalPages = 1;
var pageSize = 50;
var searchTimer = null;

function api(path, body) {
  return fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-token": token },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

if (token) {
  document.getElementById("loginScreen").classList.add("hide");
  document.getElementById("app").classList.remove("hide");
  load();
}

function login() {
  var pass = document.getElementById("loginPass").value;
  api("/api/login", { password: pass }).then(function(r) {
    if (r.success) {
      token = r.token;
      localStorage.setItem("token", token);
      document.getElementById("loginScreen").classList.add("hide");
      document.getElementById("app").classList.remove("hide");
      load();
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  });
}

document.getElementById("loginPass").addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

function logout() {
  token = null;
  localStorage.removeItem("token");
  location.reload();
}

document.getElementById("bulkCount").addEventListener("input", function() {
  document.getElementById("bulkLabel").textContent = this.value;
});

function load() {
  api("/api/stats", {}).then(function(s) {
    document.getElementById("statTotal").textContent = s.total || 0;
    document.getElementById("statActive").textContent = s.activated || 0;
    document.getElementById("statRevoked").textContent = s.revoked || 0;
    document.getElementById("statUnused").textContent = s.unactivated || 0;
    document.getElementById("headerStats").textContent = (s.total || 0) + " keys";
  });
  api("/api/db-status", {}).then(function(r) {
    document.getElementById("dbStatus").textContent = "DB: " + (r.database || "?");
  });
  fetchKeys();
}

function fetchKeys() {
  var search = document.getElementById("searchBox").value;
  api("/api/list", { filter: filter, page: curPage, limit: pageSize, search: search || undefined }).then(function(r) {
    if (r.success) {
      allKeys = r.keys;
      totalKeys = r.total;
      totalPages = r.pages || 1;
      render();
    }
  });
}

function render() {
  var search = document.getElementById("searchBox").value.toLowerCase();
  var tbody = document.getElementById("tableBody");

  if (allKeys.length === 0) {
    tbody.innerHTML = "<tr><td colspan=\"11\" style=\"text-align:center;padding:32px;color:#8b949e\">No keys found</td></tr>";
    renderPagination();
    return;
  }

  allKeys.sort(function(a, b) {
    var va = a[sf], vb = b[sf];
    if (sf === "status") {
      va = a.revoked ? "revoked" : a.activated ? "active" : "unused";
      vb = b.revoked ? "revoked" : b.activated ? "active" : "unused";
    }
    if (!va) va = "";
    if (!vb) vb = "";
    return va < vb ? sd : va > vb ? -sd : 0;
  });

  var html = "";
  for (var i = 0; i < allKeys.length; i++) {
    var k = allKeys[i];
    var st = k.revoked ? "revoked" : k.activated ? "active" : "unused";
    var sl = k.revoked ? "Revoked" : k.activated ? "Active" : "Unused";
    var exp = k.expires ? new Date(k.expires).toLocaleString() : "-";
    var cre = k.createdAt ? new Date(k.createdAt).toLocaleString() : "-";
    var last = k.lastSeen ? new Date(k.lastSeen).toLocaleString() : "-";
    var hw = k.hwid || "-";
    var ip = k.lastIp || "-";
    var uses = (k.maxUses ? (k.usageCount || 0) + "/" + k.maxUses : String(k.usageCount || 0));

    html += "<tr>";
    html += "<td><input type=\"checkbox\" class=\"cbox\" value=\"" + k.key + "\" onchange=\"updateBulkBtns()\"></td>";
    html += "<td class=\"key-txt\" onclick=\"copyKey('" + k.key + "')\" title=\"Click to copy\">" + k.key + "</td>";
    html += "<td><span class=\"badge badge-" + st + "\">" + sl + "</span></td>";
    html += "<td class=\"hwid-txt\" title=\"" + (k.hwid || "") + "\">" + hw + "</td>";
    html += "<td class=\"small\">" + (k.note || "-") + "</td>";
    html += "<td style=\"text-align:center;color:#8b949e;font-size:12px\">" + uses + "</td>";
    html += "<td class=\"small\">" + cre + "</td>";
    html += "<td class=\"small\">" + exp + "</td>";
    html += "<td class=\"small\">" + last + "</td>";
    html += "<td class=\"ip-txt\" title=\"" + (k.lastIp || "") + "\">" + ip + "</td>";
    html += "<td class=\"actions\">";
    if (k.revoked) {
      html += "<button class=\"btn btn-pri\" style=\"padding:4px 8px;font-size:11px\" onclick=\"doUnrevoke('" + k.key + "')\">Restore</button>";
    } else {
      html += "<button class=\"btn btn-red\" style=\"padding:4px 8px;font-size:11px\" onclick=\"doRevoke('" + k.key + "')\">Revoke</button>";
    }
    html += "<button class=\"btn btn-sec\" style=\"padding:4px 8px;font-size:11px\" onclick=\"doReset('" + k.key + "')\">HWID</button>";
    html += "<button class=\"btn btn-red\" style=\"padding:4px 8px;font-size:11px\" onclick=\"doDelete('" + k.key + "')\">Del</button>";
    html += "</td></tr>";
  }
  tbody.innerHTML = html;
  document.getElementById("selectAll").checked = false;
  updateBulkBtns();
  renderPagination();
}

function renderPagination() {
  var el = document.getElementById("pagination");
  if (totalPages <= 1) { el.innerHTML = ""; return; }
  var html = "<div class=\"pages\">";
  html += "<span class=\"small\" style=\"margin-right:8px\">Page " + curPage + "/" + totalPages + " (" + totalKeys + " total)</span>";

  if (curPage > 1) html += "<button class=\"pbtn\" onclick=\"goPage(1)\">First</button>";
  if (curPage > 1) html += "<button class=\"pbtn\" onclick=\"goPage(" + (curPage - 1) + ")\">Prev</button>";

  var start = Math.max(1, curPage - 2);
  var end = Math.min(totalPages, curPage + 2);
  for (var p = start; p <= end; p++) {
    html += "<button class=\"pbtn" + (p === curPage ? " cur" : "") + "\" onclick=\"goPage(" + p + ")\">" + p + "</button>";
  }

  if (curPage < totalPages) html += "<button class=\"pbtn\" onclick=\"goPage(" + (curPage + 1) + ")\">Next</button>";
  if (curPage < totalPages) html += "<button class=\"pbtn\" onclick=\"goPage(" + totalPages + ")\">Last</button>";
  html += "</div>";
  el.innerHTML = html;
}

function goPage(p) {
  curPage = p;
  fetchKeys();
}

function searchChanged() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { curPage = 1; fetchKeys(); }, 300);
}

function setFilter(f, btn) {
  filter = f;
  curPage = 1;
  var btns = document.querySelectorAll(".fbtn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  fetchKeys();
}

function sortBy(field) {
  if (sf === field) sd *= -1;
  else { sf = field; sd = -1; }
  render();
}

function toggleAll() {
  var checked = document.getElementById("selectAll").checked;
  var boxes = document.querySelectorAll("#tableBody .cbox");
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = checked;
  updateBulkBtns();
}

function updateBulkBtns() {
  var boxes = document.querySelectorAll("#tableBody .cbox:checked");
  var count = boxes.length;
  document.getElementById("bulkRevokeBtn").style.display = count > 0 ? "inline-block" : "none";
  document.getElementById("bulkDeleteBtn").style.display = count > 0 ? "inline-block" : "none";
}

function getSelectedKeys() {
  var boxes = document.querySelectorAll("#tableBody .cbox:checked");
  var keys = [];
  for (var i = 0; i < boxes.length; i++) keys.push(boxes[i].value);
  return keys;
}

function bulkRevoke() {
  var keys = getSelectedKeys();
  if (keys.length === 0) return;
  if (!confirm("Revoke " + keys.length + " selected keys?")) return;
  api("/api/bulk-revoke", { keys: keys }).then(function(r) {
    if (r.success) load();
  });
}

function bulkDelete() {
  var keys = getSelectedKeys();
  if (keys.length === 0) return;
  if (!confirm("DELETE " + keys.length + " selected keys? This cannot be undone!")) return;
  api("/api/bulk-delete", { keys: keys }).then(function(r) {
    if (r.success) load();
  });
}

function copyKey(key) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(key).then(function() {
      showCopied();
    });
  } else {
    var ta = document.createElement("textarea");
    ta.value = key;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showCopied();
  }
}

function showCopied() {
  var el = document.getElementById("copiedToast");
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 1500);
}

function exportCSV() {
  var search = document.getElementById("searchBox").value;
  api("/api/export", { filter: filter === "all" ? undefined : filter, search: search || undefined }).then(function(r) {
    if (r.success && r.csv) {
      var blob = new Blob([r.csv], { type: "text/csv" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "keys.csv";
      a.click();
      URL.revokeObjectURL(url);
    }
  });
}

function doRevoke(key) { api("/api/revoke", { key: key }).then(load); }
function doUnrevoke(key) { api("/api/unrevoke", { key: key }).then(load); }
function doReset(key) { if (confirm("Reset HWID for " + key + "?")) api("/api/reset-hwid", { key: key }).then(load); }
function doDelete(key) { if (confirm("Delete " + key + "?")) api("/api/delete", { key: key }).then(load); }

function generateKey() {
  var expires = document.getElementById("genExpires").value;
  var note = document.getElementById("genNote").value;
  var maxUses = parseInt(document.getElementById("genMaxUses").value) || null;
  api("/api/generate", { expires: expires ? new Date(expires).toISOString() : null, note: note, maxUses: maxUses }).then(function(r) {
    var el = document.getElementById("genResult");
    if (r.success) {
      el.textContent = r.key;
      el.className = "msg";
      copyKey(r.key);
      load();
    } else {
      el.textContent = "error";
      el.className = "msg err";
    }
  });
}

function bulkGenerate() {
  var count = parseInt(document.getElementById("bulkCount").value) || 1;
  var expires = document.getElementById("bulkExpires").value;
  var note = document.getElementById("bulkNote").value;
  var maxUses = parseInt(document.getElementById("bulkMaxUses").value) || null;
  api("/api/generate-bulk", { count: Math.min(count, 100), expires: expires ? new Date(expires).toISOString() : null, note: note, maxUses: maxUses }).then(function(r) {
    var el = document.getElementById("bulkResult");
    el.textContent = r.success ? "Generated " + r.count + " keys" : "error";
    el.className = "msg" + (r.success ? "" : " err");
    if (r.success) load();
  });
}

function revokeKey() {
  var key = document.getElementById("manageKey").value.trim();
  if (!key) return;
  api("/api/revoke", { key: key }).then(function(r) {
    var el = document.getElementById("manageResult");
    el.textContent = r.success ? "Revoked" : "Not found";
    el.className = "msg" + (r.success ? "" : " err");
    if (r.success) load();
  });
}

function unrevokeKey() {
  var key = document.getElementById("manageKey").value.trim();
  if (!key) return;
  api("/api/unrevoke", { key: key }).then(function(r) {
    var el = document.getElementById("manageResult");
    el.textContent = r.success ? "Restored" : "Not found";
    el.className = "msg" + (r.success ? "" : " err");
    if (r.success) load();
  });
}

function deleteKey() {
  var key = document.getElementById("manageKey").value.trim();
  if (!key || !confirm("Delete " + key + "?")) return;
  api("/api/delete", { key: key }).then(function(r) {
    var el = document.getElementById("manageResult");
    el.textContent = r.success ? "Deleted" : "Not found";
    el.className = "msg" + (r.success ? "" : " err");
    if (r.success) load();
  });
}

function resetHWID() {
  var key = document.getElementById("resetKey").value.trim();
  if (!key || !confirm("Reset HWID for " + key + "?")) return;
  api("/api/reset-hwid", { key: key }).then(function(r) {
    var el = document.getElementById("resetResult");
    el.textContent = r.success ? "HWID reset" : "Not found";
    el.className = "msg" + (r.success ? "" : " err");
    if (r.success) load();
  });
}

function purgeExpired() {
  if (!confirm("Delete all expired keys?")) return;
  api("/api/purge-expired", {}).then(function(r) {
    if (r.success) { load(); }
  });
}

setInterval(load, 15000);
</script>
</body>
</html>
